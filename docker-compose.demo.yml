# SkyImage 演示站 Docker Compose 配置
# 用于快速部署演示站环境

version: '3.8'

services:
  skyimage-demo:
    # 使用演示站专用镜像
    image: ${DOCKER_IMAGE:-your-org/skyimage-demo}:demo-latest
    
    # 容器名称
    container_name: skyimage-demo
    
    # 端口映射
    ports:
      - "${HTTP_PORT:-8080}:8080"
    
    # 环境变量配置
    environment:
      # 基础配置
      - HTTP_ADDR=:8080
      - STORAGE_PATH=storage/uploads
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost:8080}
      - FRONTEND_DIST=dist
      
      # 数据库配置 - 强制使用 SQLite
      - DATABASE_TYPE=sqlite
      - DATABASE_PATH=storage/data/demo.db
      
      # 用户注册配置
      - ALLOW_REGISTRATION=false
      
      # CORS 配置
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      
      # 可信代理配置
      - TRUSTED_PROXIES=${TRUSTED_PROXIES:-}
      
      # 演示站专用配置
      - DEMO_MODE=true
      - SITE_NAME=${SITE_NAME:-SkyImage Demo}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-demo_admin}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-demo@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-DemoPass123!}
      - SKIP_INSTALL=${SKIP_INSTALL:-true}
      
      # 演示站限制配置
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-5242880}
      - MAX_CAPACITY=${MAX_CAPACITY:-104857600}
      
      # 时区配置
      - TZ=${TZ:-Asia/Shanghai}
    
    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/installer/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # 重启策略
    restart: unless-stopped
    
    # 资源限制（演示站建议设置）
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # 标签
    labels:
      - "com.skyimage.description=SkyImage Demo Site"
      - "com.skyimage.mode=demo"
      - "com.skyimage.version=${VERSION:-latest}"

# ==========================================
# 重要提示
# ==========================================
#
# 1. ⚠️  演示站不使用任何持久化存储卷（volumes）
# 2. ⚠️  所有数据仅保存在容器内，容器重启后数据将丢失
# 3. ⚠️  演示站仅用于功能展示，不建议用于生产环境
# 4. ⚠️  演示站默认禁止用户注册
# 5. ⚠️  演示站有文件大小和存储容量限制
#
# ==========================================
# 使用方法
# ==========================================
#
# 1. 使用默认配置启动：
#    docker-compose -f docker-compose.demo.yml up -d
#
# 2. 使用自定义配置启动：
#    docker-compose -f docker-compose.demo.yml up -d \
#      -e SITE_NAME="My Demo Site" \
#      -e ADMIN_USERNAME="admin" \
#      -e ADMIN_EMAIL="admin@demo.com" \
#      -e ADMIN_PASSWORD="SecurePass123!"
#
# 3. 使用环境变量文件启动：
#    创建 .env.demo 文件并配置环境变量
#    docker-compose -f docker-compose.demo.yml --env-file .env.demo up -d
#
# 4. 查看日志：
#    docker-compose -f docker-compose.demo.yml logs -f
#
# 5. 停止并清理：
#    docker-compose -f docker-compose.demo.yml down
#
# ==========================================