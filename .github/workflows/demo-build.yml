name: Build and Push Demo Docker Image

# 演示站专用CI/CD工作流
# 特点：
# 1. 使用版本号 + commit hash 作为标签
# 2. 禁止添加任何持久化存储策略配置
# 3. 默认使用SQLite数据库
# 4. 支持环境变量配置站点信息
# 5. 支持跳过初始化程序

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      site_name:
        description: '站点名称'
        required: false
        type: string
        default: 'SkyImage Demo'
      admin_username:
        description: '管理员用户名'
        required: false
        type: string
        default: 'admin'
      admin_email:
        description: '管理员邮箱'
        required: false
        type: string
        default: 'admin@example.com'
      admin_password:
        description: '管理员密码'
        required: false
        type: string
        default: 'DemoPass123!'
      skip_install:
        description: '跳过初始化程序'
        required: false
        type: boolean
        default: true

jobs:
  build-and-push:
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Docker image name
        id: docker_image
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            DOCKER_IMAGE="${{ github.repository_owner }}/skyimage-demo"
          else
            DOCKER_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/skyimage-demo"
          fi
          echo "docker_image=${DOCKER_IMAGE}" >> $GITHUB_OUTPUT
          echo "DOCKER_IMAGE=${DOCKER_IMAGE}" >> $GITHUB_ENV

      - name: Get version and commit hash
        id: version
        run: |
          # 从 version.go 文件中读取版本号
          VERSION=$(grep 'const Version = "' internal/version/version.go | sed 's/const Version = "//;s/"//' | tr -d ' ')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          
          # 获取 commit hash 的前7位
          COMMIT_HASH=$(git rev-parse --short=7 HEAD)
          echo "commit_hash=${COMMIT_HASH}" >> $GITHUB_OUTPUT
          
          # 组合版本标识：版本号-commit hash
          VERSION_TAG="${VERSION}-${COMMIT_HASH}"
          echo "version_tag=${VERSION_TAG}" >> $GITHUB_OUTPUT
          
          echo "版本号: ${VERSION}"
          echo "Commit Hash: ${COMMIT_HASH}"
          echo "版本标识: ${VERSION_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=demo-${{ steps.version.outputs.version_tag }}
            type=raw,value=demo-latest

      - name: Prepare demo environment config
        run: |
          # 创建演示站专用环境配置
          cat > .env.demo << EOF
          # 演示站专用配置
          HTTP_ADDR=:8080
          STORAGE_PATH=storage/uploads
          PUBLIC_BASE_URL=http://localhost:8080
          ALLOW_REGISTRATION=false
          FRONTEND_DIST=dist
          
          # 数据库配置 - 强制使用SQLite
          DATABASE_TYPE=sqlite
          DATABASE_PATH=storage/data/demo.db
          
          # CORS 配置
          CORS_ALLOWED_ORIGINS=
          
          # 可信代理配置
          TRUSTED_PROXIES=
          
          # 演示站站点配置（可通过环境变量覆盖）
          SITE_NAME=${{ inputs.site_name || 'SkyImage Demo' }}
          ADMIN_USERNAME=${{ inputs.admin_username || 'demo_admin' }}
          ADMIN_EMAIL=${{ inputs.admin_email || 'demo@example.com' }}
          ADMIN_PASSWORD=${{ inputs.admin_password || 'DemoPass123!' }}
          SKIP_INSTALL=${{ inputs.skip_install || 'true' }}
          
          # 演示站限制配置
          DEMO_MODE=true
          MAX_FILE_SIZE=5242880
          MAX_CAPACITY=104857600
          EOF

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.demo
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DEMO_MODE=true
            SITE_NAME=${{ inputs.site_name || 'SkyImage Demo' }}
            ADMIN_USERNAME=${{ inputs.admin_username || 'demo_admin' }}
            ADMIN_EMAIL=${{ inputs.admin_email || 'demo@example.com' }}
            ADMIN_PASSWORD=${{ inputs.admin_password || 'DemoPass123!' }}
            SKIP_INSTALL=${{ inputs.skip_install || 'true' }}
          cache-from: type=gha,scope=demo-build-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=demo-build-${{ matrix.platform }}
          outputs: type=image,name=${{ env.DOCKER_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Docker image name
        id: docker_image
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            DOCKER_IMAGE="${{ github.repository_owner }}/skyimage-demo"
          else
            DOCKER_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/skyimage-demo"
          fi
          echo "docker_image=${DOCKER_IMAGE}" >> $GITHUB_OUTPUT
          echo "DOCKER_IMAGE=${DOCKER_IMAGE}" >> $GITHUB_ENV

      - name: Get version and commit hash
        id: version
        run: |
          # 从 version.go 文件中读取版本号
          VERSION=$(grep 'const Version = "' internal/version/version.go | sed 's/const Version = "//;s/"//' | tr -d ' ')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          
          # 获取 commit hash 的前7位
          COMMIT_HASH=$(git rev-parse --short=7 HEAD)
          echo "commit_hash=${COMMIT_HASH}" >> $GITHUB_OUTPUT
          
          # 组合版本标识：版本号-commit hash
          VERSION_TAG="${VERSION}-${COMMIT_HASH}"
          echo "version_tag=${VERSION_TAG}" >> $GITHUB_OUTPUT
          
          echo "版本号: ${VERSION}"
          echo "Commit Hash: ${COMMIT_HASH}"
          echo "版本标识: ${VERSION_TAG}"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          VERSION_TAG="${{ steps.version.outputs.version_tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          DOCKER_IMAGE="${{ env.DOCKER_IMAGE }}"
          
          # 生成标签：只保留必要的标签
          # demo-{version}-{hash}: 完整版本标识
          # demo-latest: 最新版本
          TAG1="${DOCKER_IMAGE}:demo-${VERSION_TAG}"
          TAG2="${DOCKER_IMAGE}:demo-latest"
          
          # 输出标签，确保在一行中（使用 printf 避免 echo 的自动换行）
          printf "tags=%s,%s\n" "$TAG1" "$TAG2" >> $GITHUB_OUTPUT
          printf "version=%s\n" "$VERSION" >> $GITHUB_OUTPUT
          printf "version_tag=%s\n" "$VERSION_TAG" >> $GITHUB_OUTPUT
          printf "tag_name=demo-%s\n" "$VERSION_TAG" >> $GITHUB_OUTPUT
          
          echo "生成的标签: ${TAG1},${TAG2}"

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          # 获取标签并移除所有换行符
          RAW_TAGS="${{ steps.tags.outputs.tags }}"
          CLEAN_TAGS=$(echo "$RAW_TAGS" | tr -d '\n\r')
          
          echo "原始标签: $RAW_TAGS"
          echo "清理后标签: $CLEAN_TAGS"
          
          # 分割标签
          TAGS_ARRAY=($(echo "$CLEAN_TAGS" | tr ',' ' '))
          echo "标签数组: ${TAGS_ARRAY[@]}"
          
          # 构建标签参数
          TAG_ARGS=""
          for tag in "${TAGS_ARRAY[@]}"; do
            if [ -n "$tag" ]; then
              TAG_ARGS="$TAG_ARGS -t $tag"
            fi
          done
          
          echo "标签参数: $TAG_ARGS"
          
          # 执行命令
          docker buildx imagetools create $TAG_ARGS \
            $(printf '${{ env.DOCKER_IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.DOCKER_IMAGE }}:${{ steps.tags.outputs.tag_name }}

      - name: Prepare demo release notes
        run: |
          echo "## 演示站版本 ${VERSION_TAG}" > demo_release_notes.md
          echo "" >> demo_release_notes.md
          echo "### 版本信息" >> demo_release_notes.md
          echo "" >> demo_release_notes.md
          echo "- **版本号:** ${VERSION}" >> demo_release_notes.md
          echo "- **Commit Hash:** ${COMMIT_HASH}" >> demo_release_notes.md
          echo "- **完整标识:** ${VERSION_TAG}" >> demo_release_notes.md
          echo "" >> demo_release_notes.md
          echo "### 演示站配置信息" >> demo_release_notes.md
          echo "" >> demo_release_notes.md
          echo "- **站点名称:** ${SITE_NAME}" >> demo_release_notes.md
          echo "- **管理员用户:** ${ADMIN_USERNAME}" >> demo_release_notes.md
          echo "- **管理员邮箱:** ${ADMIN_EMAIL}" >> demo_release_notes.md
          echo "- **数据库类型:** SQLite (临时存储)" >> demo_release_notes.md
          echo "- **跳过初始化:** ${SKIP_INSTALL}" >> demo_release_notes.md
          echo "" >> demo_release_notes.md
          echo "### 演示站限制说明" >> demo_release_notes.md
          echo "" >> demo_release_notes.md
          echo "- ⚠️ **禁止添加持久化存储策略** - 所有数据仅保存在容器内" >> demo_release_notes.md
          echo "- ⚠️ **禁止注册新用户** - 演示站仅允许使用预设管理员账户" >> demo_release_notes.md
          echo "- ⚠️ **禁止创建 API Token** - 确保数据安全" >> demo_release_notes.md
          echo "- ⚠️ **上传图片强制私有** - 私有图片需登录查看" >> demo_release_notes.md
          echo "- ⚠️ **文件大小限制:** 最大 5MB" >> demo_release_notes.md
          echo "- ⚠️ **存储容量限制:** 最大 100MB" >> demo_release_notes.md
          echo "- ⚠️ **数据定期清理** - 容器重启后数据将丢失" >> demo_release_notes.md
          echo "" >> demo_release_notes.md
          echo "---" >> demo_release_notes.md
          echo "" >> demo_release_notes.md
          echo "## Docker 镜像" >> demo_release_notes.md
          echo "- \`$DOCKER_IMAGE:demo-${VERSION_TAG}\`" >> demo_release_notes.md
          echo "- \`$DOCKER_IMAGE:demo-latest\`" >> demo_release_notes.md
          echo "" >> demo_release_notes.md
          echo "## 快速启动" >> demo_release_notes.md
          echo "" >> demo_release_notes.md
          echo '```bash' >> demo_release_notes.md
          echo "docker run -d -p 8080:8080 --name skyimage-demo $DOCKER_IMAGE:demo-${VERSION_TAG}" >> demo_release_notes.md
          echo '```' >> demo_release_notes.md
          echo "" >> demo_release_notes.md
          echo "访问 http://localhost:8080 即可体验演示站功能" >> demo_release_notes.md
        env:
          VERSION_TAG: ${{ steps.version.outputs.version_tag }}
          VERSION: ${{ steps.version.outputs.version }}
          COMMIT_HASH: ${{ steps.version.outputs.commit_hash }}
          SITE_NAME: ${{ inputs.site_name || 'SkyImage Demo' }}
          ADMIN_USERNAME: ${{ inputs.admin_username || 'demo_admin' }}
          ADMIN_EMAIL: ${{ inputs.admin_email || 'demo@example.com' }}
          SKIP_INSTALL: ${{ inputs.skip_install || 'true' }}
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: demo-${{ steps.version.outputs.version_tag }}
          name: Demo Release ${{ steps.version.outputs.version_tag }}
          body_path: demo_release_notes.md
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build summary
        run: |
          echo "## 演示站构建完成 ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**版本号:** ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit Hash:** ${COMMIT_HASH}" >> $GITHUB_STEP_SUMMARY
          echo "**版本标识:** ${VERSION_TAG}" >> $GITHUB_STEP_SUMMARY
          echo "**标签:** ${TAGS}" >> $GITHUB_STEP_SUMMARY
          echo "**类型:** 演示站版本" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 演示站配置" >> $GITHUB_STEP_SUMMARY
          echo "- 站点名称: ${{ inputs.site_name || 'SkyImage Demo' }}" >> $GITHUB_STEP_SUMMARY
          echo "- 管理员用户: ${{ inputs.admin_username || 'demo_admin' }}" >> $GITHUB_STEP_SUMMARY
          echo "- 管理员邮箱: ${{ inputs.admin_email || 'demo@example.com' }}" >> $GITHUB_STEP_SUMMARY
          echo "- 跳过初始化: ${{ inputs.skip_install || 'true' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 重要提示" >> $GITHUB_STEP_SUMMARY
          echo "- ⚠️ 演示站禁止添加持久化存储策略" >> $GITHUB_STEP_SUMMARY
          echo "- ⚠️ 演示站禁止创建 API Token" >> $GITHUB_STEP_SUMMARY
          echo "- ⚠️ 上传图片强制设置为私有" >> $GITHUB_STEP_SUMMARY
          echo "- ⚠️ 所有数据仅保存在容器内，重启后将丢失" >> $GITHUB_STEP_SUMMARY
          echo "- ⚠️ 演示站仅用于功能展示，不建议用于生产环境" >> $GITHUB_STEP_SUMMARY
        env:
          VERSION: ${{ steps.version.outputs.version }}
          COMMIT_HASH: ${{ steps.version.outputs.commit_hash }}
          VERSION_TAG: ${{ steps.version.outputs.version_tag }}
          TAGS: ${{ steps.tags.outputs.tags }}